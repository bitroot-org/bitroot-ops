name: Deploy to OnePlus

on:
  workflow_call:
    inputs:
      project_name:
        description: "PM2 project name (must match ~/bin/ports.conf entry)"
        required: true
        type: string
      ssh_user:
        description: "Termux SSH username"
        required: false
        type: string
        default: "u0_a238"
      ssh_host:
        description: "SSH hostname (Cloudflare tunnel)"
        required: false
        type: string
        default: "ssh-oneplus.bitroot.in"
    secrets:
      ONEPLUS_SSH_KEY:
        description: "ed25519 private key for the deploy user"
        required: true
      CF_ACCESS_CLIENT_ID:
        description: "Cloudflare Access service token client ID"
        required: true
      CF_ACCESS_CLIENT_SECRET:
        description: "Cloudflare Access service token client secret"
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.project_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg | \
            sudo tee /usr/share/keyrings/cloudflare-main.gpg > /dev/null
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared focal main' | \
            sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -qq && sudo apt-get install -y cloudflared

      - name: Configure SSH via Cloudflare Access
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write deploy private key
          echo "${{ secrets.ONEPLUS_SSH_KEY }}" > ~/.ssh/oneplus-deploy-key
          chmod 600 ~/.ssh/oneplus-deploy-key

          # SSH config: route through cloudflared with service token auth
          cat >> ~/.ssh/config << 'EOF'
          Host ssh-oneplus.bitroot.in
            StrictHostKeyChecking no
            IdentityFile ~/.ssh/oneplus-deploy-key
            ProxyCommand cloudflared access ssh --hostname %h
          EOF
          chmod 600 ~/.ssh/config

        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Deploy via SSH
        run: |
          ssh \
            -o ConnectTimeout=30 \
            ${{ inputs.ssh_user }}@${{ inputs.ssh_host }} \
            "export PATH=\"\$HOME/bin:\$PATH\"; project deploy ${{ inputs.project_name }}"
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Verify health check
        run: |
          PROJECT="${{ inputs.project_name }}"
          URL="https://${PROJECT}.bitroot.in/health"
          echo "checking $URL ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "::warning::health check at $URL not responding — app may still be starting"
          exit 0
